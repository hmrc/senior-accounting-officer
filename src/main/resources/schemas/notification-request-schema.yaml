$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
required:
  - companies
properties:
  companies:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - utr
        - name
        - accPeriodEnd
        - status
        - type
      properties:
        crn:
          type: string
          pattern: "^([0-9]{8}|[A-Z]{2}[0-9]{6})$"
        utr:
          type: string
          pattern: "^[0-9]{10}$"
        name:
          type: string
          minLength: 1
          maxLength: 160
        accPeriodEnd:
          type: string
          format: date
        status:
          type: string
        type:
          type: string
          enum:
            - PLC
            - LTD
  saos:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date