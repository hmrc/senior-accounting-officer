$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false
required:
  - saoName
  - saoEmail
  - companies
  - subscriptionId
properties:
  submitterName:
    type: string
    minLength: 1
    maxLength: 254
  saoName:
    type: string
    minLength: 1
    maxLength: 254
  saoEmail:
    type: string
    pattern: "^.+[@].+[.].+$"
    minLength: 1
    maxLength: 254
  staffPid:
    type: string
    maxLength: 30
  customerId:
    type: string
    maxLength: 30
  subscriptionId:
    type: string
    maxLength: 15
  companies:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - crn
        - utr
        - name
        - accPeriodEnd
        - status
        - type
        - isCorporationTaxQualified
        - isVatQualified
        - isPayeQualified
        - isInsurancePremiumTaxQualified
        - isStampDutyLandTaxQualified
        - isStampDutyReserveTaxQualified
        - isPetroleumRevenueTaxQualified
        - isCustomsDutiesQualified
        - isExciseDutiesQualified
        - isBankLevyQualified
      properties:
        crn:
          type: string
          pattern: "^([0-9]{8}|[A-Z]{2}[0-9]{6})$"
          maxLength: 8
        utr:
          type: string
          pattern: "^[0-9]{10}$"
          maxLength: 13
        name:
          type: string
          minLength: 1
          maxLength: 160
        accPeriodEnd:
          type: string
          format: date
        status:
          type: string
          maxLength: 20
        type:
          type: string
          maxLength: 10
          enum:
            - PLC
            - LTD
        isCorporationTaxQualified:
          type: boolean
        isVatQualified:
          type: boolean
        isPayeQualified:
          type: boolean
        isInsurancePremiumTaxQualified:
          type: boolean
        isStampDutyLandTaxQualified:
          type: boolean
        isStampDutyReserveTaxQualified:
          type: boolean
        isPetroleumRevenueTaxQualified:
          type: boolean
        isCustomsDutiesQualified:
          type: boolean
        isExciseDutiesQualified:
          type: boolean
        isBankLevyQualified:
          type: boolean
        qualificationStatement:
          type: string
          maxLength: 32767
  remarks:
    type: string
    minLength: 1
    maxLength: 32767